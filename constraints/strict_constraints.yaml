name: nhanes_strict_tiers

description: >
  Strict tiered background knowledge for NHANES causal discovery.

tiers:
  demographics:
    order: 0
    variables:
      - Age
      - Gender

  income:
    order: 1
    variables:
      - Income_Ratio

  behavior_diet:
    order: 2
    variables:
      - Vigorous_Activity
      - Sedentary_Minutes
      - Total_Calories
      - Protein_g
      - Carbohydrates_g
      - Total_Sugars_g
      - Dietary_Fiber_g

  body_measures:
    order: 3
    variables:
      - BMI
      - Waist_Circumference
    
  blood_pressure:
    order: 4
    variables:
      - Systolic_BP
      - Diastolic_BP

no_parents:
  # - Age
  # - Gender

parent_restrictions:
  # BMI:
  #   allowed_sources:
  #     - Age
  #     - Gender

forbidden_edges:
  - source: BMI
    target: Waist_Circumference
  - source: Age
    target: BMI
  - source: Gender
    target: BMI
  - source: Age
    target: Waist_Circumference
  - source: Gender
    target: Waist_Circumference

required_edges:
# - source: Age
#   target: BMI
# - source: BMI
#   target: Systolic_BP

same_tier_edges_allowed: true

allowed_tier_breaks:
  # - source: BMI
  #   target: Vigorous_Activity
  # - source: BMI
  #   target: Sedentary_Minutes
  # - source: Waist_Circumference
  #   target: Vigorous_Activity
  # - source: Waist_Circumference
  #   target: Sedentary_Minutes
  # - source: Systolic_BP
  #   target: Vigorous_Activity
  # - source: Diastolic_BP
  #   target: Vigorous_Activity